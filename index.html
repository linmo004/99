<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HALO·九</title>
<link rel="stylesheet" href="style-main.css">
<link rel="stylesheet" href="style-modal.css">
<link rel="stylesheet" href="style-page2.css">
<link rel="stylesheet" href="settings.css">
<link rel="stylesheet" href="liao-base.css">
<link rel="stylesheet" href="liao-chat.css">
<link rel="stylesheet" href="liao-rolelib.css">
<link rel="stylesheet" href="liao-myhome.css">
<link rel="stylesheet" href="liao-suiyan.css">
<link rel="stylesheet" href="liao-settings.css">
<link rel="stylesheet" href="liao-special.css">
<link rel="stylesheet" href="lockscreen.css">
<link rel="stylesheet" href="worldbook.css">
<link rel="stylesheet" href="garden.css">
</head>
<body>

<!-- 片段挂载点 -->
<div id="partial-lockscreen"></div>
<div id="partial-main-ui"></div>
<div id="partial-home-modals"></div>
<div id="partial-settings-app"></div>
<div id="partial-liao-app"></div>
<div id="partial-liao-chat"></div>
<div id="partial-liao-modals"></div>
<div id="partial-worldbook"></div>
<div id="partial-garden-app"></div>   <!-- 加上这行 -->

<script>
(function () {
  const partials = [
    { id: 'partial-lockscreen',    file: 'lockscreen.html' },
    { id: 'partial-main-ui',       file: 'main-ui.html' },
    { id: 'partial-home-modals',   file: 'home-modals.html' },
    { id: 'partial-settings-app',  file: 'settings-app.html' },
    { id: 'partial-liao-app',      file: 'liao-app.html' },
    { id: 'partial-liao-chat',     file: 'liao-chat.html' },
    { id: 'partial-liao-modals',   file: 'liao-modals.html' },
    { id: 'partial-worldbook', file: 'worldbook.html' },
    { id: 'partial-garden-app', file: 'garden.html' },
  ];

  async function loadAll() {
    for (const p of partials) {
      const res  = await fetch(p.file);
      const html = await res.text();
      document.getElementById(p.id).innerHTML = html;
    }
    initScripts();
  }

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload  = resolve;
      s.onerror = reject;
      document.body.appendChild(s);
    });
  }

    async function initScripts() {
    await loadScript('app.js');
    await loadScript('settings.js');
    await loadScript('liao-core.js');
    await loadScript('liao-rolelib.js');
    await loadScript('liao-myhome.js');
    await loadScript('liao-suiyan.js');
    await loadScript('liao-chat.js');
    await loadScript('liao-special.js');
    await loadScript('liao-persona.js');
    await loadScript('liao-favorites.js');
    await loadScript('lockscreen.js');
    await loadScript('worldbook.js');
    await loadScript('garden-core.js');   
    await loadScript('garden-ui.js');     
    await loadScript('garden-main.js');   
    initPrivacySettings();
  }


  function initPrivacySettings() {
    const gotoPrivacy = document.getElementById('goto-privacy');
    if (gotoPrivacy) {
      gotoPrivacy.addEventListener('click', function () {
        document.getElementById('settings-root').style.display = 'none';
        document.getElementById('settings-privacy').style.display = 'flex';
      });
    }
    const privacyBack = document.querySelector('#settings-privacy .settings-back-btn');
    if (privacyBack) {
      privacyBack.addEventListener('click', function () {
        document.getElementById('settings-privacy').style.display = 'none';
        document.getElementById('settings-root').style.display = 'flex';
      });
    }
    const pinSaveBtn = document.getElementById('privacy-pin-save-btn');
    if (pinSaveBtn) {
      pinSaveBtn.addEventListener('click', function () {
        const msgEl   = document.getElementById('privacy-pin-msg');
        const oldVal  = document.getElementById('privacy-old-pin').value;
        const newVal  = document.getElementById('privacy-new-pin').value;
        const confVal = document.getElementById('privacy-confirm-pin').value;
        msgEl.style.color = '#e07a7a';
        if (!oldVal || !newVal || !confVal) { msgEl.textContent = '请填写全部字段'; return; }
        if (!/^\d{6}$/.test(newVal)) { msgEl.textContent = '新密码必须为6位数字'; return; }
        if (newVal !== confVal) { msgEl.textContent = '两次输入的新密码不一致'; return; }
        if (!window.LockScreen) { msgEl.textContent = '锁屏模块未加载'; return; }
        const ok = window.LockScreen.changePin(oldVal, newVal);
        if (!ok) { msgEl.textContent = '当前密码错误'; return; }
        msgEl.style.color = '#5aaa7a';
        msgEl.textContent = '密码已更新';
        document.getElementById('privacy-old-pin').value    = '';
        document.getElementById('privacy-new-pin').value    = '';
        document.getElementById('privacy-confirm-pin').value = '';
        setTimeout(() => { msgEl.textContent = ''; }, 2000);
      });
    }
  }

  loadAll().catch(err => { console.error('[Partial Loader] 加载失败：', err); });
})();
</script>
</body>
</html>
