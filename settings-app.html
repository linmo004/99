<!-- ===================== 设置App 覆盖层 ===================== -->
<div id="settings-root" class="settings-layer" style="display:none;">
  <div class="settings-topbar">
    <button class="settings-back-btn" id="settings-root-close">&#8592;</button>
    <div class="settings-topbar-title">设置</div>
  </div>
  <div class="settings-list">
    <div class="settings-item" id="goto-api">
      <div class="settings-item-left">
        <div class="settings-item-icon">*</div>
        <div class="settings-item-info">
          <div class="settings-item-title">API 设置</div>
          <div class="settings-item-sub">配置模型接口与密钥</div>
        </div>
      </div>
      <div class="settings-item-arrow">›</div>
    </div>
    <div class="settings-item" id="goto-theme">
      <div class="settings-item-left">
        <div class="settings-item-icon">◈</div>
        <div class="settings-item-info">
          <div class="settings-item-title">美化 / 主题</div>
          <div class="settings-item-sub">壁纸、图标、配色</div>
        </div>
      </div>
      <div class="settings-item-arrow">›</div>
    </div>
    <div class="settings-item" id="goto-data">
      <div class="settings-item-left">
        <div class="settings-item-icon">▣</div>
        <div class="settings-item-info">
          <div class="settings-item-title">数据管理</div>
          <div class="settings-item-sub">导入 / 导出全部数据</div>
        </div>
      </div>
      <div class="settings-item-arrow">›</div>
    </div>
    <div class="settings-item" id="goto-privacy">
      <div class="settings-item-left">
        <div class="settings-item-icon">◎</div>
        <div class="settings-item-info">
          <div class="settings-item-title">隐私设置</div>
          <div class="settings-item-sub">修改密码与锁屏头像</div>
        </div>
      </div>
      <div class="settings-item-arrow">›</div>
    </div>
  </div>
</div>

<!-- API 设置页 -->
<div id="settings-api" class="settings-layer" style="display:none;">
  <div class="settings-topbar">
    <button class="settings-back-btn" data-back="settings-root">&#8592;</button>
    <div class="settings-topbar-title">API 设置</div>
  </div>
  <div class="settings-scroll">
    <div class="settings-section-title">当前配置</div>
    <div class="settings-card">
      <label class="settings-label">配置名称</label>
      <input class="settings-input" id="api-config-name" placeholder="给这套配置起个名字…">
      <label class="settings-label">API 地址</label>
      <input class="settings-input" id="api-url" placeholder="https://api.example.com/v1">
      <label class="settings-label">API 密钥</label>
      <input class="settings-input" id="api-key" type="password" placeholder="sk-…">
      <div class="settings-row-btns">
        <button class="settings-btn-primary" id="api-fetch-models-btn">拉取模型</button>
        <button class="settings-btn-ghost" id="api-save-btn">保存配置</button>
      </div>
      <div id="api-fetch-status" class="api-status-text"></div>
      <label class="settings-label" id="api-model-label" style="display:none;">选择模型</label>
      <select class="settings-input" id="api-model-select" style="display:none;"></select>
      <button class="settings-btn-primary" id="api-model-confirm-btn" style="display:none;margin-top:6px;">确认选择模型</button>
    </div>
    <div class="settings-section-title">配置存档</div>
    <div id="api-archive-list" class="settings-card"></div>
  </div>
</div>

<!-- 美化/主题页 -->
<div id="settings-theme" class="settings-layer" style="display:none;">
  <div class="settings-topbar">
    <button class="settings-back-btn" data-back="settings-root">&#8592;</button>
    <div class="settings-topbar-title">美化 / 主题</div>
  </div>
  <div class="settings-scroll">
    <div class="settings-section-title">壁纸</div>
    <div class="settings-card">
      <div class="theme-wallpaper-preview" id="wallpaper-preview"></div>
      <div class="settings-row-btns" style="margin-top:10px;">
        <button class="settings-btn-primary" id="wallpaper-url-btn">输入URL</button>
        <button class="settings-btn-ghost" id="wallpaper-local-btn">本地上传</button>
        <button class="settings-btn-danger" id="wallpaper-clear-btn">清除</button>
      </div>
      <input type="file" id="wallpaper-file-input" accept="image/*" style="display:none;">
    </div>
    <div class="settings-section-title">App 图标替换</div>
    <div class="settings-card" id="icon-replace-list"></div>
    <div class="settings-section-title">整体配色</div>
    <div class="settings-card">
      <div id="color-fields"></div>
      <div class="settings-row-btns" style="margin-top:10px;">
        <button class="settings-btn-primary" id="color-apply-btn">应用配色</button>
        <button class="settings-btn-ghost" id="color-reset-btn">恢复默认</button>
      </div>
    </div>
  </div>
</div>

<!-- 数据管理页 -->
<div id="settings-data" class="settings-layer" style="display:none;">
  <div class="settings-topbar">
    <button class="settings-back-btn" data-back="settings-root">&#8592;</button>
    <div class="settings-topbar-title">数据管理</div>
  </div>
  <div class="settings-scroll">
    <div class="settings-section-title">全部数据</div>
    <div class="settings-card">
      <div class="settings-desc">导出当前所有配置为 JSON 文件</div>
      <div class="settings-row-btns" style="margin-top:8px;">
        <button class="settings-btn-primary" id="export-all-btn">导出全部</button>
        <button class="settings-btn-ghost" id="import-all-btn">导入全部</button>
      </div>
      <input type="file" id="import-all-file" accept=".json" style="display:none;">
    </div>
    <div class="settings-section-title">美化数据</div>
    <div class="settings-card">
      <div class="settings-desc">仅导出 / 导入美化相关数据</div>
      <div class="settings-row-btns" style="margin-top:8px;">
        <button class="settings-btn-primary" id="export-theme-btn">导出美化</button>
        <button class="settings-btn-ghost" id="import-theme-btn">导入美化</button>
      </div>
      <input type="file" id="import-theme-file" accept=".json" style="display:none;">
    </div>
    <div class="settings-section-title">危险操作</div>
    <div class="settings-card">
      <div class="settings-desc" style="color:#e05c5c;">清除全部本地数据，不可恢复</div>
      <button class="settings-btn-danger" id="clear-all-data-btn" style="margin-top:8px;">清除全部数据</button>
    </div>
  </div>
</div>

<!-- 隐私设置页 -->
<div id="settings-privacy" class="settings-layer" style="display:none;">
  <div class="settings-topbar">
    <button class="settings-back-btn" data-back="settings-root">&#8592;</button>
    <div class="settings-topbar-title">隐私设置</div>
  </div>
  <div class="settings-scroll">

    <!-- 锁屏头像 -->
    <div class="settings-section-title">锁屏头像</div>
    <div class="settings-card">
      <div class="settings-desc">修改输入密码界面顶部显示的头像。</div>
      <!-- 当前头像预览 -->
      <div style="display:flex;align-items:center;gap:14px;margin-top:14px;">
        <img id="privacy-pin-avatar-preview"
          src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=halo9"
          alt="锁屏头像"
          style="width:56px;height:56px;border-radius:50%;object-fit:cover;
                 border:2.5px solid rgba(179,216,244,0.5);background:#2c3448;
                 flex-shrink:0;">
        <div style="flex:1;font-size:12px;color:var(--text-light);line-height:1.6;">
          该头像将显示在密码输入界面顶部
        </div>
      </div>
      <!-- Tab 切换 -->
      <div class="edit-tab-row" style="margin-top:14px;">
        <button class="edit-tab active" data-pin-avatar-tab="url">输入 URL</button>
        <button class="edit-tab" data-pin-avatar-tab="local">本地上传</button>
      </div>
      <!-- URL 面板 -->
      <div id="pin-avatar-url-panel">
        <input class="settings-input" id="privacy-pin-avatar-url"
          placeholder="输入图片 URL…" style="margin-top:0;">
      </div>
      <!-- 本地上传面板 -->
      <div id="pin-avatar-local-panel" style="display:none;">
        <input type="file" id="privacy-pin-avatar-file" accept="image/*"
          style="margin-top:6px;font-size:12px;color:var(--text-mid);width:100%;">
      </div>
      <div class="settings-row-btns" style="margin-top:12px;">
        <button class="settings-btn-primary" id="privacy-pin-avatar-save-btn">保存头像</button>
        <button class="settings-btn-ghost" id="privacy-pin-avatar-reset-btn">恢复默认</button>
      </div>
      <div id="privacy-pin-avatar-msg"
        style="font-size:12px;margin-top:8px;height:16px;color:#e07a7a;"></div>
    </div>

    <!-- 主屏幕密码 -->
    <div class="settings-section-title">主屏幕密码</div>
    <div class="settings-card">
      <div class="settings-desc">修改解锁主屏幕所需的 6 位数字密码。</div>
      <label class="settings-label" style="margin-top:12px;">当前密码</label>
      <input class="settings-input" id="privacy-old-pin" type="password"
        inputmode="numeric" maxlength="6" placeholder="输入当前密码">
      <label class="settings-label">新密码（6位数字）</label>
      <input class="settings-input" id="privacy-new-pin" type="password"
        inputmode="numeric" maxlength="6" placeholder="输入新密码">
      <label class="settings-label">确认新密码</label>
      <input class="settings-input" id="privacy-confirm-pin" type="password"
        inputmode="numeric" maxlength="6" placeholder="再次输入新密码">
      <div id="privacy-pin-msg"
        style="font-size:12px;margin-top:8px;height:16px;color:#e07a7a;"></div>
      <div class="settings-row-btns" style="margin-top:10px;">
        <button class="settings-btn-primary" id="privacy-pin-save-btn">保存新密码</button>
      </div>
    </div>

  </div>
</div>

<!-- 壁纸URL弹窗 -->
<div class="modal-mask" id="wallpaper-url-modal">
  <div class="modal-box">
    <div class="modal-title">输入壁纸图片URL</div>
    <input class="modal-input" id="wallpaper-url-input" placeholder="https://…" style="height:40px;resize:none;">
    <div class="btn-row">
      <button class="modal-btn" id="wallpaper-url-confirm">确认</button>
      <button class="modal-btn-ghost" id="wallpaper-url-cancel">取消</button>
    </div>
  </div>
</div>

<!-- App图标替换弹窗 -->
<div class="modal-mask" id="icon-replace-modal">
  <div class="modal-box">
    <div class="modal-title" id="icon-replace-modal-title">替换图标</div>
    <div class="edit-tab-row">
      <button class="edit-tab active" data-icon-tab="url">输入URL</button>
      <button class="edit-tab" data-icon-tab="local">本地上传</button>
    </div>
    <div id="icon-url-panel">
      <input class="modal-input" id="icon-url-input" placeholder="图标图片URL…" style="height:40px;resize:none;">
    </div>
    <div id="icon-local-panel" style="display:none;">
      <input type="file" id="icon-file-input" accept="image/*"
        style="margin-bottom:10px;font-size:12px;color:var(--text-mid);width:100%;">
    </div>
    <div class="btn-row">
      <button class="modal-btn" id="icon-replace-confirm">确认</button>
      <button class="modal-btn-ghost" id="icon-replace-cancel">取消</button>
    </div>
  </div>
</div>
